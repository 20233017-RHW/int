<html>
    <head>
        <title>Self Introduction</title>
        <style>
            body{
                margin : 0;
                height : 100%;
                background: linear-gradient(to bottom, #1a1a1a, #333);
                font-family: sans-serif; 
            }
            #mainImage {
                display: none; 
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 900px;
                height: 1200px;
                object-fit: contain;
                border: none;           
                margin: 0;          
                padding: 0;        
                background: none;
            }
            #title {
                color : white;
                font-size : 70px;
                font-weight: bold;
                text-align : center;
                position: absolute;
                top : 50%; 
                left : 50%;
                transform: translate(-50%, -50%);
                text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            }
            
            
            .nav-container {
                position: absolute;
                top: 30px; 
                width: 100%;
                display: flex;
                justify-content: center; 
                gap: 20px;
                z-index: 10;
            }

            .nav{
                padding: 15px 30px; 
                background-color : gray;
                color : white; 
                font-weight: bold;
                border-radius: 8px;
                min-width: 60px;     
                text-align: center;
                box-shadow: 2px 2px 6px rgba(0,0,0,0.5);
                transition: all 0.3s ease;
                cursor: pointer; 
            }
            .nav:hover{
                background-color : green;
                color: white;
                transform: scale(1.1);
            }
        </style>
    </head>
    <body>
        <div id="title">Self Introduction</div>
        <img id="mainImage" src="" alt="이미지">
        
        <div class="nav-container">
            <div class="nav" id="north" onclick="
                document.getElementById('mainImage').src='northeast.png';
                document.getElementById('mainImage').style.display = 'block';
                document.getElementById('title').style.display='none';">Achievement
            </div>

            <div class="nav" id="west" onclick="
                document.getElementById('mainImage').src = 'west.png';
                document.getElementById('mainImage').style.display = 'block';
                document.getElementById('title').style.display='none';">Resume
            </div>
            
            <div class="nav" id="center" onclick="
                document.getElementById('mainImage').src = 'north.png';
                document.getElementById('mainImage').style.display = 'block';
                document.getElementById('title').style.display='none';">Photo
            </div>

            <div class="nav" id="east" onclick="
                document.getElementById('mainImage').src = 'east.png'; 
                document.getElementById('mainImage').style.display = 'block';
                document.getElementById('title').style.display='none';">Skills
            </div>

            <div class="nav" id="south" onclick="
                document.getElementById('mainImage').src = 'south.png';
                document.getElementById('mainImage').style.display = 'block'; 
                document.getElementById('title').style.display='none';">Finding
            </div>
        </div>
    </body>
</html>
